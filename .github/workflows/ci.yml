name: Build, Test and Publish

on:
  push:
    branches: [main, dev]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify dist output
        run: |
          test -f dist/index.js || (echo "dist/index.js not found" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts not found" && exit 1)
          test -f dist/node.js || (echo "dist/node.js not found" && exit 1)
          test -f dist/node.d.ts || (echo "dist/node.d.ts not found" && exit 1)
          echo "Build artifacts verified successfully"

  release:
    name: Publish NPM Package
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: npm-publish
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine release type
        env:
          MAINTAINERS_KEYS: ${{ vars.MAINTAINERS_KEYS }}
          PROD_RELEASE_BRANCH: main
          DEV_RELEASE_BRANCH: dev
        run: source "${GITHUB_WORKSPACE}/ci/setup_env.sh"

      - name: Publish NPM Package
        run: "${GITHUB_WORKSPACE}/ci/publish_npm.sh"

      - name: Create GitHub Release
        if: env.PROD_RELEASE == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: "${GITHUB_WORKSPACE}/ci/gh_release.sh"
