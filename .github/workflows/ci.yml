name: Build, Test and Publish

on:
  push:
    branches: [main, dev]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify dist output
        run: |
          test -f dist/index.js || (echo "dist/index.js not found" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts not found" && exit 1)
          test -f dist/node.js || (echo "dist/node.js not found" && exit 1)
          test -f dist/node.d.ts || (echo "dist/node.d.ts not found" && exit 1)
          echo "Build artifacts verified successfully"

  release:
    name: Publish NPM Package
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Determine release type
        env:
          MAINTAINERS_KEYS: ${{ vars.MAINTAINERS_KEYS }}
          PROD_RELEASE_BRANCH: main
          DEV_RELEASE_BRANCH: dev
        run: source "${GITHUB_WORKSPACE}/ci/setup_env.sh"

      - name: Publish NPM Package
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: "${GITHUB_WORKSPACE}/ci/publish_npm.sh"

      - name: Create GitHub Release
        if: env.PROD_RELEASE == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: "${GITHUB_WORKSPACE}/ci/gh_release.sh"
